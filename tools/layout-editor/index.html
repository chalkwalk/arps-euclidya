<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arps Euclidya Layout Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toolbar">
        <h2>Arps Euclidya Layouts</h2>
        <button id="btn-open-dir">Open src/ Directory</button>
        <select id="sel-node" disabled>
            <option value="">Select a Node JSON...</option>
        </select>
        <button id="btn-save" disabled>Save to Disk</button>
        <button id="btn-undo" disabled title="Undo (Ctrl+Z)">↩ Undo</button>
        <button id="btn-redo" disabled title="Redo (Ctrl+Y)">↪ Redo</button>
        <label id="scale-label">Scale:</label>
        <input type="range" id="scale-slider" min="1" max="6" step="0.5" value="3">
        <span id="scale-display">3.0×</span>
        <span id="edit-mode-badge"></span>
        <span id="status-message"></span>
    </div>
    <div id="main-content">
        <div id="canvas-wrapper">
            <!-- canvas and overlay rendered by JS -->
        </div>
        <div id="properties-panel">
            <h3>Properties</h3>
            <div id="props-content">
                <p>Select an element on the canvas to edit its properties.</p>
            </div>

            <h3>Node Settings</h3>
            <div class="prop-row">
                <label>Grid Width</label>
                <input type="number" id="node-w" min="1" max="20">
            </div>
            <div class="prop-row">
                <label>Grid Height</label>
                <input type="number" id="node-h" min="1" max="20">
            </div>

            <h3>View</h3>
            <div class="prop-row">
                <label>Mode</label>
                <select id="sel-preview-mode">
                    <option value="0">Compact</option>
                    <option value="1">Unfolded</option>
                </select>
            </div>
            <div id="tab-bar-section"></div>

            <div id="unfold-settings" style="display:none">
                <h3>Unfold Extents</h3>
                <div class="prop-row">
                    <label>Up / Down</label>
                    <div style="display:flex;gap:5px">
                        <input type="number" id="unfold-up" min="0" max="10" value="0" style="width:52px">
                        <input type="number" id="unfold-down" min="0" max="10" value="0" style="width:52px">
                    </div>
                </div>
                <div class="prop-row">
                    <label>Left / Right</label>
                    <div style="display:flex;gap:5px">
                        <input type="number" id="unfold-left" min="0" max="10" value="0" style="width:52px">
                        <input type="number" id="unfold-right" min="0" max="10" value="0" style="width:52px">
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="editor.js"></script>
</body>
</html>
