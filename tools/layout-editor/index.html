<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arps Euclidya Layout Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toolbar">
        <h2>Arps Euclidya Layouts</h2>
        <button id="btn-open-dir">Open src/ Directory</button>
        <select id="sel-node" disabled>
            <option value="">Select a Node JSON...</option>
        </select>
        <button id="btn-save" disabled>Save to Disk</button>
        <button id="btn-undo" disabled title="Undo (Ctrl+Z)">↩ Undo</button>
        <button id="btn-redo" disabled title="Redo (Ctrl+Y)">↪ Redo</button>
        <label id="scale-label">Scale:</label>
        <input type="range" id="scale-slider" min="1" max="6" step="0.5" value="3">
        <span id="scale-display">3.0×</span>
        <span id="edit-mode-badge"></span>
        <span id="status-message"></span>
    </div>
    <div id="main-content">
        <div id="canvas-wrapper">
            <!-- canvas and overlay rendered by JS -->
        </div>
        <div id="properties-panel">
            <h3>Properties</h3>
            <div id="props-content">
                <p>Select an element on the canvas to edit its properties.</p>
            </div>
            <h3 id="node-settings">Node Settings</h3>
            <div class="prop-row">
                <label>Grid Width</label>
                <input type="number" id="node-w" min="1" max="10">
            </div>
            <div class="prop-row">
                <label>Grid Height</label>
                <input type="number" id="node-h" min="1" max="10">
            </div>
            <h3 id="origami-settings">Origami Settings</h3>
            <div class="prop-row">
                <label>Extended Grid Width</label>
                <input type="number" id="node-ew" min="0" max="10">
            </div>
            <div class="prop-row">
                <label>Extended Grid Height</label>
                <input type="number" id="node-eh" min="0" max="10">
            </div>
            <div class="prop-row">
                <label>Preview Mode</label>
                <select id="sel-preview-mode">
                    <option value="0">Folded (Base)</option>
                    <option value="1">Unfolded (Extended)</option>
                </select>
            </div>
        </div>
    </div>
    <script src="editor.js"></script>
</body>
</html>
